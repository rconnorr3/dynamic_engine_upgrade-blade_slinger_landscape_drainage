<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Landscape Service Catalog</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="site-header">
  <div class="header-center">
    <img src="assets/images/logo.jpg" alt="Blade Slinger Logo" class="site-logo">
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="catalog.html">Drainage Services</a>
      <a href="catalog2.html">Landscape Services</a>
    </nav>
  </div>
</header>

<main class="catalog-layout">
  <aside class="filters">
    <h2>Filter by Category</h2>
    <button class="filter-button" data-category="All">All Services</button>
    <button class="filter-button" data-category="Lawn & Turf Care">Lawn & Turf Care</button>
    <button class="filter-button" data-category="Planting & Garden Design">Planting & Garden Design</button>
    <button class="filter-button" data-category="Beds, Rock & Stone">Beds, Rock & Stone</button>
    <button class="filter-button" data-category="Soil & Fertility">Soil & Fertility</button>
  </aside>

  <section class="grid-section">
    <h2>Landscape Services</h2>
    <div id="product-grid"></div>
  </section>

  <aside class="cart">
    <h2>Selected Services</h2>
    <ul id="cart-list"></ul>

    <button id="submit-services" class="submit-btn">Submit Selected Services</button>
    <button id="delete-services" class="delete-btn">Delete Selected Services</button>
  </aside>
</main>

<footer class="site-footer">
  <p>&copy; 2026 Blade Slinger Landscape Drainage Services</p>
</footer>

<script src="app.js"></script>
</body>
</html>
