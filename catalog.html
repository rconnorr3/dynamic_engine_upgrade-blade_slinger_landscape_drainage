<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drainage Service Catalog</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<header class="site-header">
  <div class="header-center">
    <img src="assets/images/logo.jpg" alt="Blade Slinger Logo" class="site-logo">

    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="catalog.html">Drainage Services</a>
    </nav>
  </div>
</header>

  <main class="catalog-layout">

    <aside class="filters">
      <h2>Filter by Category</h2>
      <button class="filter-button" data-category="All">All Services</button>
      <button class="filter-button" data-category="Subsurface & Surface Drainage">Subsurface & Surface Drainage</button>
      <button class="filter-button" data-category="Grading & Structural Management">Grading & Structural Management</button>
      <button class="filter-button" data-category="Erosion Control & Landscape Features">Erosion Control & Landscape Features</button>
      <button class="filter-button" data-category="System Maintenance & Diagnostic Tools">System Maintenance & Diagnostic Tools</button>
    </aside>

    <section class="grid-section">
      <h2>Drainage Services</h2>
      <div id="product-grid"></div>
    </section>

    <aside class="cart">
      <h2>Selected Services</h2>
      <ul id="cart-list"></ul>
    </aside>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Blade Slinger Landscape Drainage Services</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
